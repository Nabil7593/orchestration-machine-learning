name: CI

# S18-1 : push + pull_request + lancement manuel
on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

# Annule un run en cours si on repousse sur la meme ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # ---------------------------------------------------------------------------
  # 1. Qualite : lint (ruff) + types (mypy) + tests (pytest)
  # ---------------------------------------------------------------------------
  quality:
    name: Qualite (lint + types + tests)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout du depot
        uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"

      # S18-2 : installation projet + outils dev (ruff, mypy, pytest)
      - name: Installation des dependances (projet + dev)
        run: pip install -e ".[dev]"

      # S18-3 : lint
      - name: Lint (ruff check)
        run: ruff check src/

      # S18-4 : format
      - name: Format (ruff format --check)
        run: ruff format --check src/

      # S18-4 : types
      - name: Types (mypy)
        run: mypy src/

      # S18-5 : tests
      - name: Tests (pytest)
        run: PYTHONPATH=src pytest --tb=short -v

  # ---------------------------------------------------------------------------
  # 2. Entrainement : baseline LogisticRegression + publication du modele
  # ---------------------------------------------------------------------------
  train:
    name: Entrainement (Continuous Training)
    runs-on: ubuntu-latest
    # S18-6 : ne s'execute que si quality est vert
    needs: quality

    steps:
      - name: Checkout du depot
        uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Installation des dependances
        run: pip install -e "."

      # S18-7 : entrainement de la baseline (dataset deja dans le depot)
      - name: Entrainement de la baseline
        run: PYTHONPATH=src python -m train

      # S18-8 : publication du modele en artefact telechargeable
      - name: Publication du modele en artefact
        uses: actions/upload-artifact@v4
        with:
          name: model
          path: models/model.joblib
