name: CD

# S19-1 : push sur main ET tags de version vX.Y.Z
on:
  push:
    branches: ["main"]
    tags: ["v*.*.*"]
  workflow_dispatch:

# Pas d'annulation en cours : on ne veut pas interrompre une livraison.
concurrency:
  group: cd-${{ github.ref }}
  cancel-in-progress: false

# S19-2 : permission d'ecrire des packages sur GHCR
permissions:
  contents: read
  packages: write

jobs:
  build-push:
    name: Build & push de l'image API (GHCR)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout du depot
        uses: actions/checkout@v4

      - name: Mise en place de Buildx
        uses: docker/setup-buildx-action@v3

      # S19-3 : connexion a GHCR avec le jeton automatique
      - name: Connexion a GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # S19-4 : calcul des tags et labels
      #   - latest sur main
      #   - SHA court du commit
      #   - version semantique sur les tags (ex: v1.2.3 -> 1.2.3)
      - name: Calcul des tags et labels
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/credit-score-api
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-
            type=semver,pattern={{version}}

      # S19-5 : build et push de l'image
      #   context : credit_score/ (ou se trouve pyproject.toml et src/)
      #   file    : docker/Dockerfile.api
      - name: Build & push de l'image
        uses: docker/build-push-action@v6
        with:
          context: credit_score/
          file: docker/Dockerfile.api
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
