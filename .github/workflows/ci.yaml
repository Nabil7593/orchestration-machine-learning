name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  quality:
    name: Code Quality & Tests
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: credit_score

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"
          cache-dependency-path: credit_score/pyproject.toml

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Lint — ruff check
        run: ruff check src/

      - name: Format — ruff format --check
        run: ruff format --check src/

      - name: Types — mypy
        run: mypy src/

      - name: Tests — pytest
        run: PYTHONPATH=src pytest --tb=short -v
